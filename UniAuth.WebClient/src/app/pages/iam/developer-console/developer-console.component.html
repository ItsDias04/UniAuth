<div class="console-page bg-surface-50 dark:bg-surface-950">
    <p-card header="Консоль разработчика" subheader="OAuth2 authorization code flow">
        <p class="m-0 text-muted-color mb-4">Нажмите кнопку, чтобы получить короткоживущий authorization code для внешней системы.</p>

        @if (errorMessage) {
            <p-message severity="error" [text]="errorMessage" styleClass="mb-4 w-full" />
        }

        @if (infoMessage) {
            <p-message severity="success" [text]="infoMessage" styleClass="mb-4 w-full" />
        }

        <button pButton type="button" label="Сгенерировать authorization code" [loading]="loading" (click)="generateAuthorizationCode()"></button>

        @if (authorizationCode) {
            <div class="result mt-4">
                <div><strong>Code:</strong> {{ authorizationCode }}</div>
                @if (redirectUrl) {
                    <div class="mt-2 break-all"><strong>Redirect URL:</strong> {{ redirectUrl }}</div>
                }
            </div>
        }
    </p-card>
</div>
